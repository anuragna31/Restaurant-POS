services:
  postgres:
    image: postgres:16
    container_name: restro_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-restaurant}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-password}
      POSTGRES_DB: ${DB_NAME:-restaurant_db}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - restro_pg_data:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4:8
    container_name: restro_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@restro.local
      PGADMIN_DEFAULT_PASSWORD: Admin@123
    ports:
      - "5050:80"
    depends_on:
      - postgres

  server:
    build:
      context: .
      dockerfile: ./server/Dockerfile
    restart: unless-stopped
    depends_on:
      - postgres
    ports:
      - "4000:4000"
    environment:
      NODE_ENV: production
      PORT: 4000
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:5173}
      JWT_SECRET: ${JWT_SECRET}
      DB_CLIENT: pg
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${DB_USER:-restaurant}
      DB_PASSWORD: ${DB_PASSWORD:-password}
      DB_NAME: ${DB_NAME:-restaurant_db}
    volumes:
      - ./.env:/app/.env:ro

  client:
    build:
      context: .
      dockerfile: ./client/Dockerfile
    restart: unless-stopped
    depends_on:
      - server
    ports:
      - "5173:80"

  db-init:
    build:
      context: .
      dockerfile: ./server/Dockerfile
    depends_on:
      - postgres
    environment:
      NODE_ENV: production
      JWT_SECRET: ${JWT_SECRET}
      DB_CLIENT: pg
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: ${DB_USER:-restaurant}
      DB_PASSWORD: ${DB_PASSWORD:-password}
      DB_NAME: ${DB_NAME:-restaurant_db}
    volumes:
      - ./.env:/app/.env:ro
    command: npm run db:schema:apply

volumes:
  restro_pg_data:

