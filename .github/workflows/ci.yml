name: CI

on:
  push:
    branches: ["main", "master"]
  pull_request:

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm"
      - name: Install deps
        run: npm ci
      - name: Server tests
        run: npm test -w server
      - name: Server build
        run: npm run build -w server
      - name: Client build
        run: npm run build -w client

